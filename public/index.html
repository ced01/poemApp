<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libre de poèmes</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap">
</head>
<body>
  <header class="py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="text-center">
            <h1>Libre de poèmes</h1>
            <div id="daily-quote">"La poésie est une création mise en mots." - Paul Éluard</div>
        </div>
        <div class="tabs-container">
            <!-- Nav tabs -->
            <ul class="nav nav-tabs" id="headerTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="poems-tab" data-bs-toggle="tab" data-bs-target="#poems" type="button" role="tab" aria-controls="poems" aria-selected="true">Poèmes</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="creation-tab" data-bs-toggle="tab" data-bs-target="#creation" type="button" role="tab" aria-controls="creation" aria-selected="false">Création</button>
                </li>
            </ul>
        </div>
        <div id="burger-btn">
            <img loading="lazy" id="logo-icon" src="img/logo.webp" width="50px" height="50px" alt="Libre de poème">
        </div>
    </div>
</header>

<div class="mt-3">
  <!-- Tab panes -->
  <div class="tab-content" id="headerTabsContent">
    <div class="tab-pane fade show active" id="poems" role="tabpanel" aria-labelledby="poems-tab">
      <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
          <div class="sidebar-menu">
            <div class="sidebar-search">
              <div class="sidebar-title">Séléction</div>
            </div>
            <div class="search-container">
              <input id="searchTitleInput" type="text" class="search" placeholder="Rechercher un poème...">
              <span class="clear-button clear-title-button" id="clear-title-button">&times;</span>
              <input id="searchPoemInput" type="text" placeholder="Par mots clé..." />
              <span class="clear-button clear-poem-button" id="clear-poem-button">&times;</span>
            </div>
          </div>
            <ul id="poemList" class="list-unstyled p-3" >
            </ul>
            <div class="random-poem-button-container">
                <button id="randomPoemButton">Découverte aléatoire</button>
            </div>
            <div class="music-player">
                <div class="track-info">
                    <p class="track-title">Titre de la piste</p>
                </div>
                <div class="controls">
                    <button class="prev-btn"></button>
                    <button class="play-btn"></button>
                    <button class="next-btn"></button>
                </div>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
            </div>
            <audio id="audio-player" src="track/Mes attentes d'automne.mp3"></audio>
        </nav>
        <main class="main-container">
            <div class="row">
                <div class="col-xl-8 col-xxl-8 mb-3 slide-container">
                    <div class="swiper-container">
                        <div class="swiper-wrapper">
                            </div>
                    </div>
                </div>
                <div class="col-xl-4 col-xxl-4 mb-3">
                    <div id="wordMapContainer">
                        <canvas id="wordMap"></canvas>
                    </div>
                </div>
              </div>
            <div id="modal" class="modal">
                <div class="modal-content">
                    <div id="modal-close">&times;</div>
                    <p id="modal-text"></p>
                </div>
            </div>
        </main>
      </div>
    </div>
    <div class="tab-pane fade" id="creation" role="tabpanel" aria-labelledby="creation-tab">
      <div class="creation">
        <div class="container mt-5">
          <form id="poemCreationForm" class="bg-light p-4 rounded shadow">
            <div class="mb-3">
              <input type="text" class="form-control" id="poemTitle" placeholder="Quel est le titre du poème" required>
            </div>
            <div class="mb-3">
              <select class="form-control" id="poemTheme" required>
                <option value="Création" selected>Création</option>
                <option value="Amour">Amour</option>
                <option value="Nature">Nature</option>
                <option value="Rêves">Rêves</option>
                <option value="Mémoire">Mémoire</option>
                <option value="Horizon">Horizon</option>
                <option value="Silence">Silence</option>
                <option value="Temps">Temps</option>
                <option value="Espoir">Espoir</option>
                <option value="Psyché">Psyché</option>
                <option value="Science">Science</option>
              </select>
            </div>
            <div class="mb-3" id="quatrainsContainer">
              <textarea class="form-control mb-2 quatrain" id="quatrain1" rows="4" placeholder="Écrivez le premier quatrain..."></textarea>
            </div>
            <button type="button" id="addQuatrainButton" class="btn btn-secondary mb-3">Ajouter un autre quatrain</button>
            <button type="submit" id="createPoemButton" class="btn btn-primary mb-3">Créer</button>
            <div id="poemCreationMessage" class="mt-2" role="status" aria-live="polite"></div>
          </form>
        </div>
      </div>
    </div>
    <div style="width: 0; height: 0;" id="VG_OVERLAY_CONTAINER">
      <!-- Here is where TIXAE Agents renders the widget. -->
      <!-- Set render to 'full-width' then adjust the width and height to 500px (for example) to render the chatbot itself without the popup. -->
    </div>

              // user: {

  <script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts/poems.js"></script>
  <script src="scripts/creation.js"></script>
</body>
</html>
